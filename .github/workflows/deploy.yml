name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Jar
        working-directory: inventory-management
        run: mvn clean package -DskipTests

      - name: Run Tests
        working-directory: inventory-management
        run: mvn test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Import Existing Terraform Resources
        working-directory: terraform
        run: |
          set +e

          terraform import aws_ecr_repository.inventory inventory-management
          terraform import aws_iam_role.inventory_ec2_role inventory-ec2-role
          terraform import aws_iam_instance_profile.inventory_profile inventory-profile
          terraform import aws_iam_role_policy_attachment.ssm inventory-ec2-role/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
          terraform import aws_iam_role_policy_attachment.ecr inventory-ec2-role/arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=inventory-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text \
            --region ap-south-1 2>/dev/null)
          if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
            terraform import aws_security_group.inventory "$SG_ID"
          fi

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=inventory-management" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text \
            --region ap-south-1 2>/dev/null)
          if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            terraform import aws_instance.inventory "$INSTANCE_ID"
          fi

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Read Terraform Outputs
        id: tf
        working-directory: terraform
        run: |
          echo "ecr_url=$(terraform output -raw ecr_url)" >> $GITHUB_OUTPUT
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      - name: Wait For EC2 Running
        run: |
          aws ec2 wait instance-running \
            --instance-ids ${{ steps.tf.outputs.instance_id }}

      - name: Wait For SSM Registration
        run: |
          for i in {1..90}
          do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.tf.outputs.instance_id }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || true)

            if [ "$STATUS" = "Online" ]; then
              echo "SSM Online"
              exit 0
            fi

            echo "Waiting for SSM... ($i/90 - $(($i * 10)) seconds elapsed)"
            sleep 10
          done

          echo "SSM registration timeout after 15 minutes"
          exit 1

      - name: Login To ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t inventory-management \
            -f inventory-management/Dockerfile \
            inventory-management

      - name: Tag Docker Image
        run: |
          docker tag inventory-management:latest \
            ${{ steps.tf.outputs.ecr_url }}:latest

      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.tf.outputs.ecr_url }}:latest

      - name: Prepare Compose File
        run: |
          sed "s|\${IMAGE_URI}|${{ steps.tf.outputs.ecr_url }}:latest|g" \
            deploy/docker-compose.yml > docker-compose-final.yml

      - name: Upload Compose File
        run: |
          CONTENT=$(base64 -w 0 docker-compose-final.yml)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ steps.tf.outputs.instance_id }} \
            --document-name AWS-RunShellScript \
            --parameters "commands=[
            'mkdir -p /opt/inventory',
            'echo $CONTENT | base64 -d > /opt/inventory/docker-compose.yml'
            ]" \
            --query "Command.CommandId" \
            --output text)

          set +e
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ steps.tf.outputs.instance_id }}
          WAIT_STATUS=$?

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ steps.tf.outputs.instance_id }} \
            --query "{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
            --output yaml

          exit $WAIT_STATUS

      - name: Deploy Application
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ steps.tf.outputs.instance_id }} \
            --document-name AWS-RunShellScript \
            --parameters "commands=[
            'aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ steps.tf.outputs.ecr_url }}',
            'cd /opt/inventory',
            'docker compose down || true',
            'docker compose pull',
            'docker compose up -d',
            'docker compose ps',
            'sleep 10',
            'docker logs --tail 100 inventory-app',
            'curl -fsS http://localhost:8080/products'
            ]" \
            --query "Command.CommandId" \
            --output text)

          set +e
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ steps.tf.outputs.instance_id }}
          WAIT_STATUS=$?

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ steps.tf.outputs.instance_id }} \
            --query "{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
            --output yaml

          exit $WAIT_STATUS

      - name: Show Application URL
        run: |
          echo "Application URL:"
          echo "http://${{ steps.tf.outputs.public_ip }}:8080"
