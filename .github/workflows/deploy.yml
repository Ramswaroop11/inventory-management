name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Jar
        working-directory: inventory-management
        run: mvn clean package -DskipTests

      - name: Run Tests
        working-directory: inventory-management
        run: mvn test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Clean Existing Resources
        run: |
          set +e  # Don't fail on errors
          echo "🗑️ Deleting conflicting resources..."

          # Delete EC2 Instance first (if exists)
          echo "Terminating EC2 instances..."
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=inventory-management" "Name=instance-state-name,Values=running,stopped" --query 'Reservations[0].Instances[0].InstanceId' --output text --region ap-south-1 2>/dev/null)
          if [ ! -z "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID" --region ap-south-1 2>&1 | head -1
            sleep 3
          fi

          # Delete Security Group
          echo "Deleting Security Group..."
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=inventory-sg" --query 'SecurityGroups[0].GroupId' --output text --region ap-south-1 2>/dev/null)
          if [ ! -z "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
            aws ec2 delete-security-group --group-id "$SG_ID" --region ap-south-1 2>&1 | head -1
          fi

          # Delete ECR
          echo "Deleting ECR repository..."
          aws ecr delete-repository --repository-name inventory-management --force --region ap-south-1 2>&1 | head -1

          # Wait for AWS to process deletions
          echo "⏳ Waiting 5 seconds for AWS to process deletions..."
          sleep 5

          echo "✅ Cleanup complete (IAM role will be replaced by Terraform)"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -replace=aws_iam_role.inventory_ec2_role
        continue-on-error: true

      - name: Retry Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Read Terraform Outputs
        id: tf
        working-directory: terraform
        run: |
          echo "ecr_url=$(terraform output -raw ecr_url)" >> $GITHUB_OUTPUT
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      - name: Wait For EC2 Running
        run: |
          aws ec2 wait instance-running \
          --instance-ids ${{ steps.tf.outputs.instance_id }}

      - name: Wait For SSM Registration
        run: |
          for i in {1..90}
          do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.tf.outputs.instance_id }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || true)

            if [ "$STATUS" = "Online" ]; then
              echo "✅ SSM Online"
              exit 0
            fi

            echo "⏳ Waiting for SSM... ($i/90 - $(($i * 10)) seconds elapsed)"
            sleep 10
          done

          echo "❌ SSM registration timeout after 15 minutes"
          exit 1

      - name: Login To ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t inventory-management \
            -f inventory-management/Dockerfile \
            inventory-management

      - name: Tag Docker Image
        run: |
          docker tag inventory-management:latest \
          ${{ steps.tf.outputs.ecr_url }}:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.tf.outputs.ecr_url }}:latest

      - name: Prepare Compose File
        run: |
          sed "s|\${IMAGE_URI}|${{ steps.tf.outputs.ecr_url }}:latest|g" \
          deploy/docker-compose.yml > docker-compose-final.yml

      - name: Upload Compose File
        run: |
          CONTENT=$(base64 -w 0 docker-compose-final.yml)

          aws ssm send-command \
            --instance-ids ${{ steps.tf.outputs.instance_id }} \
            --document-name AWS-RunShellScript \
            --parameters "commands=[
            'mkdir -p /opt/inventory',
            'echo $CONTENT | base64 -d > /opt/inventory/docker-compose.yml'
            ]"

      - name: Deploy Application
        run: |
          aws ssm send-command \
            --instance-ids ${{ steps.tf.outputs.instance_id }} \
            --document-name AWS-RunShellScript \
            --parameters "commands=[
            'aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ steps.tf.outputs.ecr_url }}',
            'cd /opt/inventory',
            'docker compose down || true',
            'docker compose pull',
            'docker compose up -d'
            ]"

      - name: Show Application URL
        run: |
          echo "Application URL:"
          echo "http://${{ steps.tf.outputs.public_ip }}:8080"