name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Tests
        working-directory: inventory-management
        run: mvn test -DskipTests

      - name: Build Jar
        working-directory: inventory-management
        run: mvn clean package -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Read Terraform Outputs
        id: tf
        working-directory: terraform
        run: |
          echo "ecr_url=$(terraform output -raw ecr_url)" >> $GITHUB_OUTPUT
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      - name: Wait For EC2 Running
        run: |
          aws ec2 wait instance-running \
          --instance-ids ${{ steps.tf.outputs.instance_id }}

      - name: Wait For SSM Registration
        run: |
          for i in {1..30}
          do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.tf.outputs.instance_id }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || true)

            if [ "$STATUS" = "Online" ]; then
              echo "SSM Online"
              exit 0
            fi

            echo "Waiting for SSM..."
            sleep 20
          done

          echo "SSM registration timeout"
          exit 1

      - name: Login To ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t inventory-management \
            -f inventory-management/Dockerfile \
            inventory-management

      - name: Tag Docker Image
        run: |
          docker tag inventory-management:latest \
          ${{ steps.tf.outputs.ecr_url }}:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.tf.outputs.ecr_url }}:latest

      - name: Prepare Compose File
        run: |
          sed "s|\${IMAGE_URI}|${{ steps.tf.outputs.ecr_url }}:latest|g" \
          deploy/docker-compose.yml > docker-compose-final.yml

      - name: Upload Compose File
        run: |
          CONTENT=$(base64 -w 0 docker-compose-final.yml)

          aws ssm send-command \
            --instance-ids ${{ steps.tf.outputs.instance_id }} \
            --document-name AWS-RunShellScript \
            --parameters "commands=[
            'mkdir -p /opt/inventory',
            'echo $CONTENT | base64 -d > /opt/inventory/docker-compose.yml'
            ]"

      - name: Deploy Application
        run: |
          aws ssm send-command \
            --instance-ids ${{ steps.tf.outputs.instance_id }} \
            --document-name AWS-RunShellScript \
            --parameters "commands=[
            'aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ steps.tf.outputs.ecr_url }}',
            'cd /opt/inventory',
            'docker compose down || true',
            'docker compose pull',
            'docker compose up -d'
            ]"

      - name: Show Application URL
        run: |
          echo "Application URL:"
          echo "http://${{ steps.tf.outputs.public_ip }}:8080"