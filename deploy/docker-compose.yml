services:

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: app123

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - inventory-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10


  inventory-app:
    image: ${IMAGE_URI}
    container_name: inventory-app
    restart: always

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inventory_db
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: app123

    networks:
      - inventory-network


volumes:
  mysql_data:

networks:
  inventory-network: