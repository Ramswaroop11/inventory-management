<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Inventory Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(
                    135deg,
                    #e0ecff 0%,
                    #f4f6f9 50%,
                    #eef2ff 100%);
            display: flex;
            align-items: center;
        }

        .custom-card {
            border: none;
            border-radius: 22px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        }

        .custom-header {
            background: linear-gradient(
                    135deg,
                    #0d6efd,
                    #6610f2);
            padding: 1rem 1.5rem;
        }

        .custom-header h3 {
            font-weight: 600;
        }

        .card-body {
            padding: 1.25rem;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: #374151;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #dbe3f0;
            padding: 0.55rem 0.8rem;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #6f42c1;
            box-shadow: 0 0 0 0.2rem rgba(111, 66, 193, 0.15);
        }

        .btn {
            border-radius: 12px;
            padding: 0.55rem 1.2rem;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(
                    135deg,
                    #0d6efd,
                    #6610f2);
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
        }

        .btn-outline-secondary {
            border-width: 2px;
        }

        .required {
            color: #dc3545;
        }

        .text-danger {
            font-size: 0.8rem;
        }

        .field-card {
            background: #f8fafc;
            border-radius: 14px;
            padding: 12px;
            border: 1px solid #edf2f7;
            height: 100%;
        }

        @media (max-width: 768px) {
            body {
                display: block;
            }

            .card-body {
                padding: 1rem;
            }
        }

    </style>

</head>

<body>

<div class="container py-3">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card custom-card">

                <div class="card-header custom-header text-white">

                    <h3 class="mb-1"
                        th:text="${product.id == null}
                        ? '📦 Add Product'
                        : '✏️ Update Product'">
                    </h3>

                    <small>

                        <span th:text="${product.id == null}
                        ? 'Create a new inventory item'
                        : 'Modify product information'">
                        </span>

                    </small>

                </div>

                <div class="card-body">

                    <form th:action="@{/products}"
                          th:object="${product}"
                          method="post">

                        <!-- Hidden ID -->
                        <input type="hidden"
                               th:field="*{id}">

                        <!-- Row 1 -->

                        <div class="row g-3 mb-3">

                            <!-- SKU -->

                            <div class="col-md-6">

                                <div class="field-card">

                                    <label class="form-label">

                                        SKU
                                        <span class="required">*</span>

                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           placeholder="LAPTOP-001"
                                           th:field="*{sku}">

                                    <div class="text-danger mt-1"
                                         th:if="${#fields.hasErrors('sku')}"
                                         th:errors="*{sku}">
                                    </div>

                                </div>

                            </div>

                            <!-- Product Name -->

                            <div class="col-md-6">

                                <div class="field-card">

                                    <label class="form-label">

                                        Product Name
                                        <span class="required">*</span>

                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           placeholder="Dell Inspiron 15"
                                           th:field="*{name}">

                                    <div class="text-danger mt-1"
                                         th:if="${#fields.hasErrors('name')}"
                                         th:errors="*{name}">
                                    </div>

                                </div>

                            </div>

                        </div>

                        <!-- Row 2 -->

                        <div class="row g-3 mb-3">

                            <!-- Quantity -->

                            <div class="col-md-6">

                                <div class="field-card">

                                    <label class="form-label">

                                        Quantity
                                        <span class="required">*</span>

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           placeholder="100"
                                           th:field="*{quantity}">

                                    <div class="text-danger mt-1"
                                         th:if="${#fields.hasErrors('quantity')}"
                                         th:errors="*{quantity}">
                                    </div>

                                </div>

                            </div>

                            <!-- Price -->

                            <div class="col-md-6">

                                <div class="field-card">

                                    <label class="form-label">

                                        Price (₹)
                                        <span class="required">*</span>

                                    </label>

                                    <input type="number"
                                           step="0.01"
                                           class="form-control"
                                           placeholder="49999.99"
                                           th:field="*{price}">

                                    <div class="text-danger mt-1"
                                         th:if="${#fields.hasErrors('price')}"
                                         th:errors="*{price}">
                                    </div>

                                </div>

                            </div>

                        </div>

                        <!-- Buttons -->

                        <div class="d-flex justify-content-between align-items-center mt-4">

                            <a th:href="@{/products}"
                               class="btn btn-outline-secondary">

                                ← Back

                            </a>

                            <button type="submit"
                                    class="btn btn-primary">

                                <span th:text="${product.id == null}
                                ? '💾 Save Product'
                                : '🔄 Update Product'">
                                </span>

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
